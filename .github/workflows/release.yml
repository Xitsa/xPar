name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish xPar -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true /p:DebugType=None -o ./publish

      - name: Archive Windows
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ./publish/*.exe -DestinationPath ./release/xPar-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Archive Linux
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf ./release/xPar-${{ github.ref_name }}-linux-x64.tar.gz -C ./publish .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
